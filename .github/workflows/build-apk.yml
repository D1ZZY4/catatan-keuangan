name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Cache bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install
        env:
          npm_config_fetch_timeout: 120000
          npm_config_fetch_retry_mintimeout: 20000
          npm_config_fetch_retry_maxtimeout: 180000
          npm_config_fetch_retries: 5
          npm_config_fetch_retry_factor: 2

      - name: Retry install if failed
        if: failure()
        run: |
          echo "First attempt failed, waiting 15s before retry..."
          sleep 15
          bun install --force
        env:
          npm_config_fetch_timeout: 180000
          npm_config_fetch_retry_mintimeout: 30000
          npm_config_fetch_retry_maxtimeout: 300000
          npm_config_fetch_retries: 8
          npm_config_fetch_retry_factor: 3

      - name: Second retry install if still failed
        if: failure()
        run: |
          echo "Second attempt failed, waiting 30s before final retry..."
          sleep 30
          bun install --force
        env:
          npm_config_fetch_timeout: 240000
          npm_config_fetch_retry_mintimeout: 60000
          npm_config_fetch_retry_maxtimeout: 600000
          npm_config_fetch_retries: 10
          npm_config_fetch_retry_factor: 4

      - name: Build PWA
        run: bun run build

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Sync Capacitor
        run: bunx cap sync android

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: catatan-keuangan-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload APK to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "Catatan Keuangan ${{ github.ref_name }}"
